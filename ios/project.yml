name: BetweenUs
options:
  bundleIdPrefix: com.betweenus
settings:
  base:
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
targets:
  BetweenUs:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.betweenus.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: BetweenUs
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: 用于记录冲突内容并生成复盘报告。
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  BetweenUsTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests
    dependencies:
      - target: BetweenUs
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.betweenus.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  BetweenUs:
    build:
      targets:
        BetweenUs: all
        BetweenUsTests: [test]
    test:
      targets:
        - name: BetweenUsTests
